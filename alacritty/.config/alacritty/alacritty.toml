[window]
padding = { x = 10, y = 1 }
decorations = "buttonless"
opacity = 0.9

[font]
size = 16

[font.normal]
family = "JetBrainsMonoNL Nerd Font"

[mouse]
hide_when_typing = true

[cursor]
blink_timeout = 0

[keyboard]
bindings = [
  { key = "Space", mods = "Shift", action = "ToggleViMode" }
]

[colors.primary]
background = '#111111'
foreground = '#fefefe'

[colors.cursor]
text = '#1a1a1a' 
cursor = '#fefefe'

[colors.normal]
black   = '#1a1a1a'
red     = '#f44747'
green   = '#6a9955'
yellow  = '#dcdcaa'
blue    = '#007acc'
magenta = '#c586c0'
cyan    = '#569cd6'
white   = '#fefefe'
